{% extends "base.html" %}

{% block content %}
<div>
    <a href="{{ url_for('add_member') }}" class="btn btn-success mb-3">Add New Member</a>
</div>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Join Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for member in members %}
        <tr>
            <td>{{ member.id }}</td>
            <td>{{ member.name }}</td>
            <td>{{ member.email }}</td>
            <td>{{ member.phone }}</td>
            <td>{{ member.join_date }}</td>
            <td>
                <a href="{{ url_for('edit_member', id=member.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
                <a href="{{ url_for('delete_member', id=member.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this member?');">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
