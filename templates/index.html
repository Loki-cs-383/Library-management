{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h1 class="text-center mb-4">Welcome to Library Management System</h1>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Manage your library efficiently</h5>
                <p class="card-text">
                    This system allows you to manage books, members, and transactions.
                    Use the navigation menu above to get started.
                </p>
                <div class="text-center">
                    <a href="{{ url_for('books') }}" class="btn btn-primary me-2">Manage Books</a>
                    <a href="{{ url_for('members') }}" class="btn btn-success me-2">Manage Members</a>
                    <a href="{{ url_for('transactions') }}" class="btn btn-info">View Transactions</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
